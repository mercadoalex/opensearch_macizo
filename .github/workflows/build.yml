name: Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          sudo mv mdbook /usr/local/bin/

      - name: Install mdbook-mermaid
        run: |
          curl -sSL https://github.com/badboy/mdbook-mermaid/releases/download/v0.17.0/mdbook-mermaid-v0.17.0-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          sudo mv mdbook-mermaid /usr/local/bin/
          mdbook-mermaid install .

      - name: Build book
        run: mdbook build

      - name: Lint shell scripts
        continue-on-error: true
        run: |
          find code/ -name "*.sh" -exec shellcheck {} + || true

      - name: Lint Python files
        continue-on-error: true
        run: |
          find code/ -name "*.py" -exec python -m py_compile {} + || true

      - name: Lint YAML files
        continue-on-error: true
        run: |
          pip install yamllint --quiet
          find code/ -name "*.yml" -o -name "*.yaml" | xargs yamllint || true
