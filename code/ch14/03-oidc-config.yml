# Ejemplo de configuración OIDC para el Security Plugin
# Archivo: config/opensearch-security/config.yml (dentro del contenedor)
#
# ⚠️ Este es un ejemplo de referencia — adapta URLs y claims a tu IdP.

_meta:
  type: "config"
  config_version: 2

config:
  dynamic:
    http:
      anonymous_auth_enabled: false
    authc:
      basic_internal_auth:
        http_enabled: true
        transport_enabled: true
        order: 0
        http_authenticator:
          type: basic
          challenge: true
        authentication_backend:
          type: internal

      oidc_auth:
        http_enabled: true
        transport_enabled: false
        order: 1
        http_authenticator:
          type: openid
          challenge: false
          config:
            openid_connect_url: "https://idp.example.com/.well-known/openid-configuration"
            subject_key: "email"
            roles_key: "groups"
        authentication_backend:
          type: noop
