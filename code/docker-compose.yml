# OpenSearch: Macizo y Conciso — Laboratorio Docker Compose
#
# Uso:
#   Perfil novato (1 nodo):       docker compose --profile novato up
#   Perfil intermedio (3 nodos):   docker compose --profile intermedio up
#   Perfil ninja (3 nodos + sec):  docker compose --profile ninja up
#   Destruir todo:                 docker compose --profile <perfil> down -v

services:
  # --- Nodo principal ---
  opensearch-node1:
    image: opensearchproject/opensearch:2.17.0
    container_name: opensearch-node1
    profiles: ["novato", "intermedio", "ninja"]
    environment:
      - cluster.name=opensearch-macizo
      - node.name=opensearch-node1
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Admin123!}
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - opensearch-net

  # --- Nodos adicionales (multi-nodo) ---
  opensearch-node2:
    image: opensearchproject/opensearch:2.17.0
    container_name: opensearch-node2
    profiles: ["intermedio", "ninja"]
    environment:
      - cluster.name=opensearch-macizo
      - node.name=opensearch-node2
      - discovery.seed_hosts=opensearch-node1,opensearch-node3
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Admin123!}
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data2:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - opensearch-net

  opensearch-node3:
    image: opensearchproject/opensearch:2.17.0
    container_name: opensearch-node3
    profiles: ["intermedio", "ninja"]
    environment:
      - cluster.name=opensearch-macizo
      - node.name=opensearch-node3
      - discovery.seed_hosts=opensearch-node1,opensearch-node2
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Admin123!}
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data3:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - opensearch-net

  # --- OpenSearch Dashboards ---
  dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: opensearch-dashboards
    profiles: ["novato", "intermedio", "ninja"]
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["https://opensearch-node1:9200"]'
    depends_on:
      opensearch-node1:
        condition: service_healthy
    networks:
      - opensearch-net

  # --- Carga automática de index patterns y dashboards de ejemplo ---
  dashboards-setup:
    image: curlimages/curl:latest
    container_name: opensearch-dashboards-setup
    profiles: ["novato", "intermedio", "ninja"]
    depends_on:
      dashboards:
        condition: service_started
    volumes:
      - ./dashboards-setup:/setup
    entrypoint: ["/bin/sh", "/setup/init.sh"]
    networks:
      - opensearch-net

volumes:
  opensearch-data1:
  opensearch-data2:
  opensearch-data3:

networks:
  opensearch-net:
